<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Game Scheduler · 控制看板</title>
<style>
  :root{
    --bg:#0b0c0e; --panel:#16181d; --panel2:#1d2026; --border:#2a2e37;
    --text:#d8dee9; --muted:#8b93a1; --accent:#3b82f6;
    --ok:#37b24d; --err:#f03e3e; --run:#1c7ed6; --warn:#f59f00; --idle:#5c6370;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font:14px/1.45 -apple-system,Segoe UI,Roboto,"Microsoft YaHei",sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:14px 22px;flex-wrap:wrap;
    background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
  header h1{font-size:16px;margin:0;font-weight:600;letter-spacing:.3px}
  header .spacer{flex:1}
  header .meta{color:var(--muted);font-size:12px}
  button{background:var(--panel2);color:var(--text);border:1px solid var(--border);
    border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px}
  button:hover{border-color:var(--accent)}
  button:disabled{opacity:.5;cursor:default}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  label.toggle{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;user-select:none}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--idle);display:inline-block}
  .live-dot.on{background:var(--ok);box-shadow:0 0 6px var(--ok)}
  main{padding:18px 22px;max-width:1400px;margin:0 auto}
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .stat .v{font-size:26px;font-weight:700}
  .stat .l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
  .stat.alert .v{color:var(--err)}
  .res{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:20px}
  .res.over{border-color:var(--err);box-shadow:0 0 0 1px var(--err) inset}
  .res .rh{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .res .rh .t{font-size:13px;font-weight:600;letter-spacing:.4px}
  .res .rh .status{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
  .res .rh .status.ok{background:rgba(55,178,77,.15);color:var(--ok)}
  .res .rh .status.over{background:rgba(240,62,62,.15);color:var(--err)}
  .res .rh .meta{margin-left:auto}
  .res .banner{margin-top:12px;color:var(--err);font-weight:600;font-size:13px}
  .gauges{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .gauge{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:5px}
  .gauge.over{border-color:var(--err)}
  .ring{position:relative;width:92px;height:92px}
  .ring svg.r{transform:rotate(-90deg)}
  .ring .arc{transition:stroke-dashoffset .5s ease,stroke .4s}
  .ring .rv{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;font-variant-numeric:tabular-nums}
  .g-label{font-size:13px;font-weight:600}
  .g-sub{color:var(--muted);font-size:11px}
  .spark{width:100%;height:24px;display:block;margin-top:2px}
  @media(max-width:620px){.gauges{grid-template-columns:1fr}}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:24px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .card .top{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .dot.ok{background:var(--ok)} .dot.error{background:var(--err)}
  .dot.warn{background:var(--warn)} .dot.idle{background:var(--idle)}
  .dot.running{background:var(--run);box-shadow:0 0 0 0 rgba(28,126,214,.7);animation:pulse 1.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(28,126,214,.6)}70%{box-shadow:0 0 0 7px rgba(28,126,214,0)}100%{box-shadow:0 0 0 0 rgba(28,126,214,0)}}
  .card .name{font-weight:600;font-size:15px;flex:1}
  .badge{font-size:11px;padding:2px 7px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}
  .badge.adapter{background:var(--panel2)}
  .icon-x{cursor:pointer;color:var(--muted);font-size:14px;padding:0 4px}
  .icon-x:hover{color:var(--err)}
  .icon-e{cursor:pointer;color:var(--muted);font-size:13px;padding:0 2px}
  .icon-e:hover{color:var(--accent)}
  .card .body{padding:12px 14px;display:grid;gap:8px}
  .row{display:flex;justify-content:space-between;gap:10px}
  .row .k{color:var(--muted)} .row .val{text-align:right}
  .counts{display:flex;gap:8px;flex-wrap:wrap}
  .pill{font-size:12px;padding:2px 8px;border-radius:6px;background:var(--panel2);border:1px solid var(--border)}
  .pill.ok{color:var(--ok)} .pill.err{color:var(--err)} .pill.run{color:var(--run)}
  .tasks,.plans{border-top:1px solid var(--border);margin-top:4px;padding-top:8px;display:grid;gap:6px}
  .task,.plan{display:flex;align-items:center;gap:8px;justify-content:space-between}
  .task .tn,.plan .pn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .task .tt{color:var(--muted);font-size:11px}
  .task button{padding:3px 10px;font-size:12px}
  .plan .cron{color:var(--muted);font-size:11px;font-family:ui-monospace,Consolas,monospace}
  .disabled-tag{color:var(--warn);font-size:11px}
  .sub{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin:2px 0}
  .sub .add{cursor:pointer;color:var(--accent);text-transform:none;letter-spacing:0}
  .switch{position:relative;width:34px;height:18px;flex:none}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:var(--idle);border-radius:20px;transition:.2s;cursor:pointer}
  .slider:before{content:"";position:absolute;height:14px;width:14px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
  .switch input:checked + .slider{background:var(--ok)}
  .switch input:checked + .slider:before{transform:translateX(16px)}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px}
  th{color:var(--muted);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.5px}
  tr:last-child td{border-bottom:none}
  .st{font-size:12px;padding:2px 8px;border-radius:6px;display:inline-block}
  .st.success{background:rgba(55,178,77,.15);color:var(--ok)}
  .st.failed{background:rgba(240,62,62,.15);color:var(--err)}
  .st.running{background:rgba(28,126,214,.15);color:var(--run)}
  .st.pending{background:rgba(245,159,0,.12);color:var(--warn)}
  .st.cancelled{background:rgba(92,99,112,.2);color:var(--idle)}
  h2{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:0 0 10px}
  .empty{color:var(--muted);padding:24px;text-align:center}
  #err{color:var(--err);font-size:12px}
  tbody tr{cursor:pointer} tbody tr:hover td{background:var(--panel2)}
  .clickable{cursor:pointer;text-decoration:underline dotted var(--muted) 1px;text-underline-offset:3px}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:40px 16px;overflow:auto}
  .overlay.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;width:min(820px,100%);max-height:85vh;display:flex;flex-direction:column}
  .modal .mh{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border)}
  .modal .mh h3{margin:0;font-size:15px;flex:1}
  .modal .mb{padding:16px 18px;overflow:auto}
  .modal .x{cursor:pointer;color:var(--muted);font-size:20px;line-height:1}
  .kv{display:grid;grid-template-columns:120px 1fr;gap:6px 14px;margin-bottom:14px}
  .kv .k{color:var(--muted)}
  pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:0 0 12px;
    max-height:240px;overflow:auto;white-space:pre-wrap;word-break:break-word;font:12px/1.5 ui-monospace,Consolas,monospace}
  .shot{max-width:100%;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;display:block}
  .danger{border-color:var(--err);color:var(--err)} .danger:hover{background:rgba(240,62,62,.12)}
  /* forms */
  .form{display:grid;gap:12px}
  .form label{display:grid;gap:4px;font-size:12px;color:var(--muted)}
  .form input,.form select,.form textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;
    color:var(--text);padding:8px 10px;font:13px/1.4 inherit;width:100%}
  .form textarea{font-family:ui-monospace,Consolas,monospace;min-height:64px;resize:vertical}
  .form .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px}
  .hint{color:var(--muted);font-size:11px}
</style>
</head>
<body>
<header>
  <h1>🎮 Game Scheduler</h1>
  <span class="badge">控制看板</span>
  <span class="spacer"></span>
  <span id="err"></span>
  <span class="meta" id="updated">—</span>
  <button onclick="openGameForm()">+ 游戏</button>
  <button onclick="openTaskForm()">+ 任务</button>
  <button onclick="openScan()">扫描</button>
  <button onclick="openHistory()">历史</button>
  <label class="toggle"><span class="live-dot" id="livedot"></span><input type="checkbox" id="live" checked> 实时</label>
  <button id="refresh">刷新</button>
  <button onclick="setToken()" title="设置 API 令牌">🔑</button>
</header>
<main>
  <div class="stats" id="stats"></div>
  <div id="resource"></div>
  <div class="grid" id="games"></div>
  <h2>最近执行</h2>
  <table>
    <thead><tr><th>#</th><th>游戏</th><th>任务</th><th>状态</th><th>触发</th><th>开始</th><th>用时</th><th>退出码</th></tr></thead>
    <tbody id="recent"></tbody>
  </table>
</main>
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mh"><h3 id="m-title">详情</h3><span class="x" onclick="closeModal()">✕</span></div>
    <div class="mb" id="m-body"></div>
  </div>
</div>
<script>
const $ = s => document.querySelector(s);
let tok = localStorage.getItem('gs_token')||'';
let meta = null;        // {adapters:[{key,task_types}]}
let lastData = null;    // most recent dashboard payload

function fmtTime(t){ if(!t) return "—"; const d=new Date(t); if(isNaN(d)) return "—"; return d.toLocaleString(); }
function rel(t){ if(!t) return ""; const s=(Date.now()-new Date(t))/1000;
  if(s<0) return "in "+Math.round(-s)+"s"; if(s<60) return Math.round(s)+"s ago";
  if(s<3600) return Math.round(s/60)+"m ago"; if(s<86400) return Math.round(s/3600)+"h ago"; return Math.round(s/86400)+"d ago"; }
function dur(s){ if(!s) return "—"; if(s<60) return s.toFixed(1)+"s"; return Math.floor(s/60)+"m"+Math.round(s%60)+"s"; }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function qs(){ return tok?('?token='+encodeURIComponent(tok)):''; }

// ---- auth-aware fetch ----
async function api(path, opts){
  opts = opts||{};
  opts.headers = Object.assign({}, opts.headers);
  if(tok) opts.headers['Authorization'] = 'Bearer '+tok;
  const r = await fetch(path, opts);
  if(r.status===401){ $("#err").textContent="需要 API 令牌"; promptToken(); throw new Error("unauthorized"); }
  return r;
}
function promptToken(){
  const t = prompt("此服务器需要 API 令牌（GS_AUTH_TOKEN）。请输入：", tok||"");
  if(t!=null){ tok=t.trim(); localStorage.setItem('gs_token',tok); $("#err").textContent=""; reconnect(); load(); }
}
function setToken(){ promptToken(); }

// ---- live stream (SSE) ----
let es=null;
function connect(){
  if(es){ es.close(); es=null; }
  es = new EventSource('/api/stream'+qs());
  es.onopen = ()=>{ $("#livedot").classList.add("on"); $("#err").textContent=""; };
  es.onmessage = e=>{ try{ render(JSON.parse(e.data)); }catch(_){ } };
  es.onerror = ()=>{ $("#livedot").classList.remove("on"); /* EventSource auto-retries */ };
}
function disconnect(){ if(es){es.close();es=null;} $("#livedot").classList.remove("on"); }
function reconnect(){ if($("#live").checked) connect(); }

// ---- render ----
function statCard(v,l,alert){ return `<div class="stat${alert?' alert':''}"><div class="v">${v}</div><div class="l">${l}</div></div>`; }

function gameCard(g){
  const last = g.last_status
    ? `<span class="st ${g.last_status} clickable" onclick="openExec(${g.last_exec_id})">${g.last_status}</span> <span class="meta">${rel(g.last_run)}</span>`
    : `<span class="meta">无记录</span>`;
  const lastErr = (g.last_status==='failed')&&g.last_error
    ? `<div class="row"><span class="k">错误</span><span class="val" style="color:var(--err);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(g.last_error)}">${esc(g.last_error)}</span></div>` : "";
  const tasks = (g.task_list||[]).map(t=>`
      <div class="task"><span class="tn">${esc(t.name)} <span class="tt">${esc(t.type)}</span></span>
      <span style="display:flex;align-items:center;gap:6px"><button onclick="runTask(${t.id},this)">运行</button>
      <span class="icon-e" title="编辑任务" onclick="editTask(${t.id})">✎</span>
      <span class="icon-x" title="删除任务" onclick="delTask(${t.id},'${esc(t.name)}')">✕</span></span></div>`).join("")
      || `<div class="meta">未配置任务</div>`;
  const plans = (g.plan_list||[]).map(p=>`
      <div class="plan">
        <span class="pn">${esc(p.name)} <span class="cron">${esc(p.cron)}</span></span>
        <span style="display:flex;align-items:center;gap:8px">
          <label class="switch" title="${p.enabled?'已启用':'已停用'} · 下次 ${p.next_run?fmtTime(p.next_run):'—'}">
            <input type="checkbox" ${p.enabled?'checked':''} onchange="togglePlan(${esc(JSON.stringify(p)).replace(/'/g,'&#39;')},this)">
            <span class="slider"></span>
          </label>
          <span class="icon-e" title="编辑计划" onclick="editPlan(${esc(JSON.stringify(p)).replace(/'/g,'&#39;')})">✎</span>
          <span class="icon-x" title="删除计划" onclick="delPlan(${p.id},'${esc(p.name)}')">✕</span>
        </span>
      </div>`).join("");
  const plansBlock = `<div class="plans"><div class="sub"><span>计划</span><span class="add" onclick="openPlanForm('${esc(g.id)}')">+ 添加</span></div>${plans||'<div class="meta">无计划</div>'}</div>`;
  return `<div class="card">
    <div class="top">
      <span class="dot ${g.health}" title="${g.health}"></span>
      <span class="name">${esc(g.name)}</span>
      <span class="badge adapter">${esc(g.adapter)}</span>
      ${g.enabled?"":'<span class="disabled-tag">已禁用</span>'}
      <span class="icon-e" title="编辑游戏" onclick="editGame('${esc(g.id)}')">✎</span>
      <span class="icon-x" title="删除游戏" onclick="delGame('${esc(g.id)}')">✕</span>
    </div>
    <div class="body">
      <div class="row"><span class="k">最近</span><span class="val">${last}</span></div>
      ${lastErr}
      <div class="row"><span class="k">下次计划</span><span class="val">${g.next_run?fmtTime(g.next_run)+' ('+rel(g.next_run)+')':'—'}</span></div>
      <div class="row"><span class="k">任务 / 计划</span><span class="val">${g.tasks} / ${g.plans}</span></div>
      <div class="counts">
        <span class="pill ok">✓ ${g.success}</span><span class="pill err">✗ ${g.failed}</span>
        ${g.active?`<span class="pill run">● ${g.active} 进行中</span>`:""}
      </div>
      <div class="tasks"><div class="sub"><span>任务</span><span class="add" onclick="openTaskForm('${esc(g.id)}')">+ 添加</span></div>${tasks}</div>
      ${plansBlock}
    </div>
  </div>`;
}

function clampPct(p){ return Math.max(0,Math.min(100,p||0)); }
function pctColor(v,colorTh){ return (colorTh>0&&v>=colorTh)?'var(--err)':(v>=70?'var(--warn)':'var(--ok)'); }
function sparkline(data,col){
  if(!data||data.length<2) return `<svg class="spark"></svg>`;
  const n=data.length,W=120,H=24;
  const pts=data.map((v,i)=>`${(i/(n-1)*W).toFixed(1)},${(H-clampPct(v)/100*H).toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" vector-effect="non-scaling-stroke"/></svg>`;
}
function ringGauge(label,pct,overTh,colorTh,sub,hist){
  const v=clampPct(pct), col=pctColor(v,colorTh), over=overTh>0&&v>=overTh;
  const r=40, c=2*Math.PI*r, off=(c*(1-v/100)).toFixed(1);
  return `<div class="gauge ${over?'over':''}">
    <div class="ring">
      <svg class="r" width="92" height="92" viewBox="0 0 92 92">
        <circle cx="46" cy="46" r="${r}" fill="none" stroke="var(--bg)" stroke-width="8"/>
        <circle class="arc" cx="46" cy="46" r="${r}" fill="none" stroke="${col}" stroke-width="8" stroke-linecap="round"
          stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off}"/>
      </svg>
      <div class="rv" style="color:${col}">${v.toFixed(0)}%</div>
    </div>
    <div class="g-label">${label}</div>
    <div class="g-sub">${sub}</div>
    ${sparkline(hist,col)}
  </div>`;
}
function renderResource(r){
  const el=$("#resource");
  if(!r||!r.enabled){ el.innerHTML=""; return; }
  const gb=mb=>(mb/1024).toFixed(1);
  const memSub = r.mem_total_mb ? `${gb(r.mem_used_mb)} / ${gb(r.mem_total_mb)} GB` : `阈值 ${r.mem_threshold}%`;
  const diskSub = r.disk_total_mb ? `${gb(r.disk_used_mb)} / ${gb(r.disk_total_mb)} GB` : '—';
  const status = r.overloaded ? `<span class="status over">⚠ 过载</span>` : `<span class="status ok">● 正常</span>`;
  const banner = r.overloaded
    ? `<div class="banner">⚠ 资源过载：${esc(r.reason)}${r.policy==='pause'?'（已暂停定时任务）':''}</div>` : "";
  el.innerHTML = `<div class="res ${r.overloaded?'over':''}">
    <div class="rh">
      <span class="t">资源监控</span>${status}
      <span class="meta">阈值 CPU ${r.cpu_threshold}% / 内存 ${r.mem_threshold}% · 策略 ${r.policy==='pause'?'过载暂停':'仅提醒'} · 近 ${(r.cpu_history||[]).length} 次采样</span>
    </div>
    <div class="gauges">
      ${ringGauge('CPU', r.cpu_percent, r.cpu_threshold, r.cpu_threshold, `阈值 ${r.cpu_threshold}%`, r.cpu_history)}
      ${ringGauge('内存', r.mem_percent, r.mem_threshold, r.mem_threshold, memSub, r.mem_history)}
      ${ringGauge('磁盘', r.disk_percent, 0, 90, diskSub, r.disk_history)}
    </div>
    ${banner}
  </div>`;
}

function render(d){
  lastData = d;
  $("#updated").textContent = "更新于 "+new Date(d.generated_at).toLocaleTimeString();
  renderResource(d.resource);
  $("#stats").innerHTML =
    statCard(d.totals.games,"游戏")+statCard(d.totals.tasks,"任务")+statCard(d.totals.plans,"计划")+
    statCard(d.totals.running,"运行中")+statCard(d.totals.failed_24h,"24h 失败",d.totals.failed_24h>0);
  $("#games").innerHTML = (d.games||[]).map(gameCard).join("") || '<div class="empty">还没有配置游戏。点右上角「+ 游戏」。</div>';
  const rows=(d.recent||[]).map(e=>`<tr onclick="openExec(${e.id})">
      <td>${e.id}</td><td>${esc(e.game_id)}</td><td>${esc(e.task_name)}</td>
      <td><span class="st ${e.status}">${e.status}</span></td>
      <td>${esc(e.trigger)}</td><td>${fmtTime(e.start_time)}</td>
      <td>${dur(e.duration_sec)}</td><td>${e.exit_code==null?'—':e.exit_code}</td></tr>`).join("");
  $("#recent").innerHTML = rows || '<tr><td colspan="8" class="empty">暂无执行记录</td></tr>';
}

async function load(){
  try{
    const r=await api("/api/dashboard"); if(!r.ok) throw new Error("HTTP "+r.status);
    render(await r.json());
  }catch(e){ if(String(e).indexOf("unauthorized")<0) $("#err").textContent="加载失败: "+e; }
}

// ---- actions ----
async function runTask(id,btn){
  btn.disabled=true; const t=btn.textContent; btn.textContent="…";
  try{ const r=await api("/api/tasks/"+id+"/run",{method:"POST"}); if(!r.ok) throw new Error("HTTP "+r.status);
    btn.textContent="已触发"; setTimeout(()=>{btn.textContent=t;btn.disabled=false;},1500); }
  catch(e){ btn.textContent="失败"; $("#err").textContent=String(e); btn.disabled=false; }
}
async function delGame(id){
  if(!confirm("删除游戏 "+id+"？其任务、计划、执行记录都会一并删除。")) return;
  try{ const r=await api("/api/games/"+id,{method:"DELETE"}); if(!r.ok&&r.status!==204) throw new Error("HTTP "+r.status); load(); }
  catch(e){ $("#err").textContent="删除失败: "+e; }
}
async function delTask(id,name){
  if(!confirm("删除任务「"+name+"」？")) return;
  try{ const r=await api("/api/tasks/"+id,{method:"DELETE"}); if(!r.ok&&r.status!==204) throw new Error("HTTP "+r.status); load(); }
  catch(e){ $("#err").textContent="删除失败: "+e; }
}
async function delPlan(id,name){
  if(!confirm("删除计划「"+name+"」？")) return;
  try{ const r=await api("/api/plans/"+id,{method:"DELETE"}); if(!r.ok&&r.status!==204) throw new Error("HTTP "+r.status); load(); }
  catch(e){ $("#err").textContent="删除失败: "+e; }
}
async function togglePlan(p,el){
  el.disabled=true;
  try{
    const body={name:p.name,task_id:p.task_id,cron_expr:p.cron,enabled:el.checked};
    const r=await api("/api/plans/"+p.id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!r.ok) throw new Error("HTTP "+r.status); $("#err").textContent="";
  }catch(e){ el.checked=!el.checked; $("#err").textContent="计划更新失败: "+e; }
  finally{ el.disabled=false; }
}

// ---- modal: generic ----
function openModal(title, html){ $("#m-title").textContent=title; $("#m-body").innerHTML=html; $("#overlay").classList.add("open"); }
function closeModal(){ $("#overlay").classList.remove("open"); }
$("#overlay").addEventListener("click",e=>{ if(e.target.id==="overlay") closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

// ---- modal: execution detail ----
async function openExec(id){
  if(!id) return;
  openModal("执行 #"+id, '<div class="empty">加载中…</div>');
  try{
    const r=await api("/api/executions/"+id); if(!r.ok) throw new Error("HTTP "+r.status);
    const e=await r.json();
    const active = e.status==="running"||e.status==="pending";
    let shot="";
    if(e.screenshot_path){
      const file=e.screenshot_path.split(/[\\/]/).pop();
      shot=`<img class="shot" src="/screenshots/${encodeURIComponent(file)}${qs()}" alt="screenshot" onerror="this.style.display='none'">
            <div class="hint">截图: ${esc(e.screenshot_path)}</div>`;
    }
    $("#m-body").innerHTML=`
      <div class="kv">
        <span class="k">状态</span><span><span class="st ${e.status}">${e.status}</span></span>
        <span class="k">触发</span><span>${esc(e.trigger)}</span>
        <span class="k">退出码</span><span>${e.exit_code==null?'—':e.exit_code}</span>
        <span class="k">开始</span><span>${fmtTime(e.start_time)}</span>
        <span class="k">结束</span><span>${fmtTime(e.end_time)}</span>
        <span class="k">重试</span><span>${e.retry_count||0}</span>
      </div>
      ${shot}
      <div class="sub"><span>命令</span></div><pre>${esc(e.command)||'—'}</pre>
      ${e.error_msg?`<div class="sub"><span>错误</span></div><pre style="color:var(--err)">${esc(e.error_msg)}</pre>`:""}
      <div class="sub"><span>stdout</span></div><pre>${esc(e.stdout)||'(空)'}</pre>
      <div class="sub"><span>stderr</span></div><pre>${esc(e.stderr)||'(空)'}</pre>
      ${active?`<button class="danger" onclick="cancelExec(${e.id})">取消执行</button>`:""}`;
  }catch(err){ if(String(err).indexOf("unauthorized")<0) $("#m-body").innerHTML='<div class="empty">加载失败: '+esc(String(err))+'</div>'; }
}
async function cancelExec(id){
  try{ const r=await api("/api/executions/"+id+"/cancel",{method:"POST"});
    if(!r.ok && r.status!==409) throw new Error("HTTP "+r.status); setTimeout(()=>openExec(id),600); }
  catch(e){ $("#err").textContent="取消失败: "+e; }
}

// ---- modal: scan / discover ----
function parentDir(p){ return p.replace(/[\\/][^\\/]*$/, ""); }
function openScan(){
  openModal("扫描工具", `<div class="form">
    <label>自定义搜索路径（可选；用 ; 或 , 分隔；留空则扫描所有磁盘）
      <input id="scan-paths" placeholder="例如 F:/Games;D:/Tools"></label>
    <div class="actions"><button type="button" onclick="closeModal()">取消</button><button class="primary" onclick="runScan()">开始扫描</button></div>
    <div id="scan-res" class="hint">扫描整盘可能需要几秒到几十秒;指定路径会快很多。</div>
  </div>`);
}
async function runScan(){
  const raw=($("#scan-paths").value||"").trim();
  const body={}; if(raw) body.paths = raw.split(/[;,]/).map(s=>s.trim()).filter(Boolean);
  $("#scan-res").innerHTML='<div class="empty">扫描中…</div>';
  try{
    const r=await api("/api/discover",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const res=await r.json();
    const rows=(res.candidates||[]).map(c=>`<tr>
      <td><span class="badge adapter">${esc(c.adapter)}</span></td>
      <td>${esc(c.tool)}</td><td>${esc(c.kind)}</td>
      <td style="font-family:ui-monospace,Consolas,monospace;font-size:11px;word-break:break-all">${esc(c.path)}</td>
      <td><button onclick="fillGameFromCandidate(${esc(JSON.stringify(c)).replace(/'/g,'&#39;')})">填入新游戏</button></td></tr>`).join("");
    $("#scan-res").innerHTML = `<div class="hint">扫描 ${(res.scanned_roots||[]).length} 个根目录,用时 ${res.elapsed_ms} ms${res.truncated?'(结果可能被截断,可缩小路径范围)':''}。</div>`
      + (rows ? `<table><thead><tr><th>游戏</th><th>工具</th><th>类型</th><th>路径</th><th></th></tr></thead><tbody>${rows}</tbody></table>`
              : '<div class="empty">未找到已知工具。可填自定义路径重试,或直接「+ 游戏」手动填写。</div>');
  }catch(e){ if(String(e).indexOf("unauthorized")<0) $("#scan-res").innerHTML='<div class="empty">扫描失败: '+esc(String(e))+'</div>'; }
}
function fillGameFromCandidate(c){
  const pre={adapter:c.adapter};
  if(c.adapter==='hsr'){
    const dir = c.kind==='dir' ? c.path : parentDir(c.path);
    const key = c.tool.toLowerCase().indexOf('fhoe')>=0 ? 'fhoe_dir' : 'march7th_dir';
    pre.extra_config = JSON.stringify({[key]:dir}); pre.name = c.tool;
  } else if(c.adapter==='r1999'){
    pre.tool_path=c.path; pre.working_dir=parentDir(c.path); pre.name='重返未来1999';
  } else {
    pre.tool_path=c.path; pre.name = c.adapter==='genshin'?'原神':(c.adapter==='wuwa'?'鸣潮':c.adapter);
  }
  openGameForm(pre); // create mode (no id), fields prefilled
}

// ---- modal: forms ----
async function ensureMeta(){ if(!meta){ const r=await api("/api/meta"); meta=await r.json(); } return meta; }
let editId=null; // current edit target id (game id / task id / plan id); null = create

// --- game form (create + edit) ---
// g may be: undefined (blank create), a full game object with .id (edit), or a
// partial prefill object without .id (create with fields filled, e.g. from scan).
async function openGameForm(g){
  const m=await ensureMeta();
  const isEdit = !!(g && g.id);
  editId = isEdit ? g.id : null;
  const opts=m.adapters.map(a=>`<option value="${a.key}" ${g&&g.adapter===a.key?'selected':''}>${a.key}</option>`).join("");
  const v=k=> g? esc(g[k]||"") : "";
  openModal(isEdit?("编辑游戏 "+esc(g.id)):"添加游戏",`<form class="form" onsubmit="return submitGame(event)">
    <div class="two">
      <label>ID（唯一，如 genshin）<input name="id" required pattern="[A-Za-z0-9_-]+" value="${isEdit?esc(g.id):''}" ${isEdit?'readonly':''}></label>
      <label>适配器<select name="adapter">${opts}</select></label>
    </div>
    <label>名称<input name="name" required value="${v('name')}"></label>
    <label>工具路径 tool_path<input name="tool_path" placeholder="如 D:/BetterGI/BetterGI.exe" value="${v('tool_path')}"></label>
    <label>工作目录 working_dir<input name="working_dir" placeholder="可选" value="${v('working_dir')}"></label>
    <label>extra_config (JSON)<textarea name="extra_config" placeholder='{"python_path":"python","march7th_dir":"..."}'>${v('extra_config')}</textarea></label>
    <label class="toggle"><input type="checkbox" name="enabled" ${!isEdit||g.enabled?'checked':''}> 启用</label>
    <div class="actions"><button type="button" onclick="closeModal()">取消</button><button class="primary" type="submit">${isEdit?'保存':'创建'}</button></div>
  </form><div id="ferr" class="hint" style="color:var(--err)"></div>`);
}
async function editGame(id){
  try{ const r=await api("/api/games/"+id); if(!r.ok) throw new Error("HTTP "+r.status); openGameForm(await r.json()); }
  catch(e){ $("#err").textContent="加载游戏失败: "+e; }
}
async function submitGame(ev){
  ev.preventDefault(); const f=ev.target;
  const ec=f.extra_config.value.trim();
  if(ec){ try{ JSON.parse(ec); }catch(_){ $("#ferr").textContent="extra_config 不是合法 JSON"; return false; } }
  const body={id:f.id.value.trim(),name:f.name.value.trim(),adapter:f.adapter.value,
    tool_path:f.tool_path.value.trim(),working_dir:f.working_dir.value.trim(),extra_config:ec,enabled:f.enabled.checked};
  const url = editId? "/api/games/"+editId : "/api/games";
  await submitForm(url, editId?"PUT":"POST", body);
  return false;
}

// --- task form (create + edit) ---
async function openTaskForm(gameId, task){
  const m=await ensureMeta();
  const games=(lastData&&lastData.games)||[];
  if(!games.length){ alert("请先添加游戏"); return; }
  editId = task? task.id : null;
  const cur = task? task.game_id : gameId;
  const gopts=games.map(g=>`<option value="${esc(g.id)}" data-adapter="${esc(g.adapter)}" ${g.id===cur?'selected':''}>${esc(g.name)} (${esc(g.id)})</option>`).join("");
  const v=k=> task? esc(task[k]==null?"":task[k]) : "";
  openModal(task?("编辑任务 #"+task.id):"添加任务",`<form class="form" onsubmit="return submitTask(event)">
    <div class="two">
      <label>游戏<select name="game_id" onchange="syncTypes(this.form)" ${task?'disabled':''}>${gopts}</select></label>
      <label>类型 type<input name="type" list="typelist" required value="${v('type')}"><datalist id="typelist"></datalist></label>
    </div>
    <label>名称<input name="name" required value="${v('name')}"></label>
    <label>params (JSON)<textarea name="params" placeholder='{"group":"采集"}  或  {"task_index":1}'>${task?esc(task.params||"{}"):"{}"}</textarea></label>
    <div class="two">
      <label>超时(秒)<input name="timeout_sec" type="number" min="0" value="${task?(task.timeout_sec||0):0}"></label>
      <label>重试次数<input name="max_retries" type="number" min="0" value="${task?(task.max_retries||0):0}"></label>
    </div>
    <label class="toggle"><input type="checkbox" name="enabled" ${!task||task.enabled?'checked':''}> 启用</label>
    <div class="actions"><button type="button" onclick="closeModal()">取消</button><button class="primary" type="submit">${task?'保存':'创建'}</button></div>
  </form><div id="ferr" class="hint" style="color:var(--err)"></div>`);
  syncTypes($("#m-body form"));
}
async function editTask(id){
  try{ const r=await api("/api/tasks/"+id); if(!r.ok) throw new Error("HTTP "+r.status); openTaskForm(null, await r.json()); }
  catch(e){ $("#err").textContent="加载任务失败: "+e; }
}
function syncTypes(form){
  const sel=form.game_id.selectedOptions[0];
  const adapter=sel?sel.getAttribute("data-adapter"):"";
  const a=(meta.adapters||[]).find(x=>x.key===adapter);
  form.querySelector("#typelist").innerHTML=(a?a.task_types:[]).map(t=>`<option value="${t}">`).join("");
  if(a&&a.task_types.length&&!form.type.value) form.type.value=a.task_types[0];
}
async function submitTask(ev){
  ev.preventDefault(); const f=ev.target;
  const pr=f.params.value.trim()||"{}";
  try{ JSON.parse(pr); }catch(_){ $("#ferr").textContent="params 不是合法 JSON"; return false; }
  const body={game_id:f.game_id.value,name:f.name.value.trim(),type:f.type.value.trim(),params:pr,
    timeout_sec:+f.timeout_sec.value||0,max_retries:+f.max_retries.value||0,enabled:f.enabled.checked};
  const url = editId? "/api/tasks/"+editId : "/api/tasks";
  await submitForm(url, editId?"PUT":"POST", body);
  return false;
}

// --- plan form (create + edit) ---
function openPlanForm(gameId, plan){
  const games=(lastData&&lastData.games)||[];
  const g=games.find(x=>x.id===gameId);
  const tasks=(g&&g.task_list)||[];
  if(!plan && !tasks.length){ alert("该游戏还没有任务，无法创建计划"); return; }
  editId = plan? plan.id : null;
  const topts=tasks.map(t=>`<option value="${t.id}" ${plan&&plan.task_id===t.id?'selected':''}>${esc(t.name)} (#${t.id})</option>`).join("")
    || (plan?`<option value="${plan.task_id}" selected>#${plan.task_id}</option>`:"");
  openModal(plan?("编辑计划 #"+plan.id):"添加计划",`<form class="form" onsubmit="return submitPlan(event)">
    <label>名称<input name="name" required value="${plan?esc(plan.name):''}"></label>
    <label>任务<select name="task_id">${topts}</select></label>
    <label>cron 表达式（5 段，或 @daily / @every 6h）
      <input name="cron_expr" required placeholder="30 6 * * *" value="${plan?esc(plan.cron):''}"></label>
    <label class="toggle"><input type="checkbox" name="enabled" ${!plan||plan.enabled?'checked':''}> 启用</label>
    <div class="actions"><button type="button" onclick="closeModal()">取消</button><button class="primary" type="submit">${plan?'保存':'创建'}</button></div>
  </form><div id="ferr" class="hint" style="color:var(--err)"></div>`);
}
function editPlan(p){ openPlanForm(null, p); }
async function submitPlan(ev){
  ev.preventDefault(); const f=ev.target;
  const body={name:f.name.value.trim(),task_id:+f.task_id.value,cron_expr:f.cron_expr.value.trim(),enabled:f.enabled.checked};
  const url = editId? "/api/plans/"+editId : "/api/plans";
  await submitForm(url, editId?"PUT":"POST", body);
  return false;
}

// shared submit: POST/PUT a JSON body, surface server error, refresh on success.
async function submitForm(url, method, body){
  try{
    const r=await api(url,{method,headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!r.ok){ let msg; try{ msg=(await r.json()).error; }catch(_){ } $("#ferr").textContent=msg||("HTTP "+r.status); return; }
    closeModal(); load();
  }catch(e){ $("#ferr").textContent=String(e); }
}

// --- execution history (filterable) ---
async function openHistory(){
  openModal("执行历史",`<div class="form">
    <div class="two">
      <label>状态<select id="h-status"><option value="">全部</option>
        <option>success</option><option>failed</option><option>running</option>
        <option>pending</option><option>cancelled</option></select></label>
      <label>条数<select id="h-limit"><option>50</option><option>100</option><option>200</option></select></label>
    </div>
    <table><thead><tr><th>#</th><th>任务</th><th>状态</th><th>触发</th><th>开始</th><th>用时</th><th>码</th></tr></thead>
    <tbody id="h-rows"><tr><td colspan="7" class="empty">加载中…</td></tr></tbody></table>
  </div>`);
  $("#h-status").addEventListener("change",loadHistory);
  $("#h-limit").addEventListener("change",loadHistory);
  loadHistory();
}
async function loadHistory(){
  const st=$("#h-status").value, lim=$("#h-limit").value;
  const taskName={}; (lastData&&lastData.games||[]).forEach(g=>(g.task_list||[]).forEach(t=>taskName[t.id]=t.name));
  try{
    const r=await api(`/api/executions?limit=${lim}${st?'&status='+st:''}`);
    const ex=await r.json();
    $("#h-rows").innerHTML = (ex||[]).map(e=>`<tr onclick="openExec(${e.id})">
      <td>${e.id}</td><td>${esc(taskName[e.task_id]||('#'+e.task_id))}</td>
      <td><span class="st ${e.status}">${e.status}</span></td><td>${esc(e.trigger)}</td>
      <td>${fmtTime(e.start_time)}</td>
      <td>${dur(e.start_time&&e.end_time?(new Date(e.end_time)-new Date(e.start_time))/1000:0)}</td>
      <td>${e.exit_code==null?'—':e.exit_code}</td></tr>`).join("")
      || '<tr><td colspan="7" class="empty">无记录</td></tr>';
  }catch(e){ $("#h-rows").innerHTML='<tr><td colspan="7" class="empty">加载失败</td></tr>'; }
}

// ---- wiring ----
// Live updates come from SSE; a safety poller covers environments where SSE is
// blocked (some proxies) by fetching only while the stream is NOT open.
let poll=null;
function startLive(){ connect(); if(!poll) poll=setInterval(()=>{ if(!es||es.readyState!==1) load(); },8000); }
function stopLive(){ disconnect(); if(poll){clearInterval(poll);poll=null;} }
$("#refresh").addEventListener("click",load);
$("#live").addEventListener("change",e=>{ if(e.target.checked) startLive(); else stopLive(); });
// ?live=0 loads a static snapshot (no open stream) — handy for screenshots.
const wantLive = new URLSearchParams(location.search).get("live") !== "0";
$("#live").checked = wantLive;
load().then(()=>{ if(wantLive) startLive(); });
</script>
