<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Game Scheduler · 控制看板</title>
<style>
  :root{
    --bg:#0b0c0e; --panel:#16181d; --panel2:#1d2026; --border:#2a2e37;
    --text:#d8dee9; --muted:#8b93a1; --accent:#3b82f6;
    --ok:#37b24d; --err:#f03e3e; --run:#1c7ed6; --warn:#f59f00; --idle:#5c6370;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font:14px/1.45 -apple-system,Segoe UI,Roboto,"Microsoft YaHei",sans-serif}
  header{display:flex;align-items:center;gap:16px;padding:14px 22px;
    background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
  header h1{font-size:16px;margin:0;font-weight:600;letter-spacing:.3px}
  header .spacer{flex:1}
  header .meta{color:var(--muted);font-size:12px}
  button{background:var(--panel2);color:var(--text);border:1px solid var(--border);
    border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px}
  button:hover{border-color:var(--accent)}
  button:disabled{opacity:.5;cursor:default}
  label.toggle{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;user-select:none}
  main{padding:18px 22px;max-width:1400px;margin:0 auto}
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .stat .v{font-size:26px;font-weight:700}
  .stat .l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
  .stat.alert .v{color:var(--err)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:24px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .card .top{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .dot.ok{background:var(--ok)} .dot.error{background:var(--err)}
  .dot.warn{background:var(--warn)} .dot.idle{background:var(--idle)}
  .dot.running{background:var(--run);box-shadow:0 0 0 0 rgba(28,126,214,.7);animation:pulse 1.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(28,126,214,.6)}70%{box-shadow:0 0 0 7px rgba(28,126,214,0)}100%{box-shadow:0 0 0 0 rgba(28,126,214,0)}}
  .card .name{font-weight:600;font-size:15px}
  .badge{font-size:11px;padding:2px 7px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}
  .badge.adapter{background:var(--panel2)}
  .card .body{padding:12px 14px;display:grid;gap:8px}
  .row{display:flex;justify-content:space-between;gap:10px}
  .row .k{color:var(--muted)} .row .val{text-align:right}
  .counts{display:flex;gap:8px;flex-wrap:wrap}
  .pill{font-size:12px;padding:2px 8px;border-radius:6px;background:var(--panel2);border:1px solid var(--border)}
  .pill.ok{color:var(--ok)} .pill.err{color:var(--err)} .pill.run{color:var(--run)}
  .tasks{border-top:1px solid var(--border);margin-top:4px;padding-top:8px;display:grid;gap:6px}
  .task{display:flex;align-items:center;gap:8px;justify-content:space-between}
  .task .tn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .task .tt{color:var(--muted);font-size:11px}
  .task button{padding:3px 10px;font-size:12px}
  .disabled-tag{color:var(--warn);font-size:11px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px}
  th{color:var(--muted);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.5px}
  tr:last-child td{border-bottom:none}
  .st{font-size:12px;padding:2px 8px;border-radius:6px;display:inline-block}
  .st.success{background:rgba(55,178,77,.15);color:var(--ok)}
  .st.failed{background:rgba(240,62,62,.15);color:var(--err)}
  .st.running{background:rgba(28,126,214,.15);color:var(--run)}
  .st.pending{background:rgba(245,159,0,.12);color:var(--warn)}
  .st.cancelled{background:rgba(92,99,112,.2);color:var(--idle)}
  h2{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:0 0 10px}
  .empty{color:var(--muted);padding:24px;text-align:center}
  #err{color:var(--err);font-size:12px}
</style>
</head>
<body>
<header>
  <h1>🎮 Game Scheduler</h1>
  <span class="badge">控制看板</span>
  <span class="spacer"></span>
  <span id="err"></span>
  <span class="meta" id="updated">—</span>
  <label class="toggle"><input type="checkbox" id="auto" checked> 自动刷新 5s</label>
  <button id="refresh">刷新</button>
</header>
<main>
  <div class="stats" id="stats"></div>
  <div class="grid" id="games"></div>
  <h2>最近执行</h2>
  <table>
    <thead><tr><th>#</th><th>游戏</th><th>任务</th><th>状态</th><th>触发</th><th>开始</th><th>用时</th><th>退出码</th></tr></thead>
    <tbody id="recent"></tbody>
  </table>
</main>
<script>
const $ = s => document.querySelector(s);
function fmtTime(t){ if(!t) return "—"; const d=new Date(t); if(isNaN(d)) return "—"; return d.toLocaleString(); }
function rel(t){ if(!t) return ""; const s=(Date.now()-new Date(t))/1000;
  if(s<0) return "in "+Math.round(-s)+"s"; if(s<60) return Math.round(s)+"s ago";
  if(s<3600) return Math.round(s/60)+"m ago"; if(s<86400) return Math.round(s/3600)+"h ago"; return Math.round(s/86400)+"d ago"; }
function dur(s){ if(!s) return "—"; if(s<60) return s.toFixed(1)+"s"; return Math.floor(s/60)+"m"+Math.round(s%60)+"s"; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function runTask(id,btn){
  btn.disabled=true; btn.textContent="…";
  try{
    const r=await fetch("/api/tasks/"+id+"/run",{method:"POST"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    btn.textContent="已触发"; setTimeout(load,500);
  }catch(e){ btn.textContent="失败"; $("#err").textContent=String(e); btn.disabled=false; }
}

function statCard(v,l,alert){ return `<div class="stat${alert?' alert':''}"><div class="v">${v}</div><div class="l">${l}</div></div>`; }

function gameCard(g){
  const counts = `<div class="counts">
      <span class="pill ok">✓ ${g.success}</span>
      <span class="pill err">✗ ${g.failed}</span>
      ${g.active?`<span class="pill run">● ${g.active} 进行中</span>`:""}
    </div>`;
  const last = g.last_status
    ? `<span class="st ${g.last_status}">${g.last_status}</span> <span class="meta">${rel(g.last_run)}</span>`
    : `<span class="meta">无记录</span>`;
  const lastErr = (g.last_status==='error'||g.last_status==='failed')&&g.last_error
    ? `<div class="row"><span class="k">错误</span><span class="val" style="color:var(--err);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(g.last_error)}">${esc(g.last_error)}</span></div>` : "";
  const tasks = (g.task_list||[]).map(t=>`
      <div class="task"><span class="tn">${esc(t.name)} <span class="tt">${esc(t.type)}</span></span>
      <button onclick="runTask(${t.id},this)">运行</button></div>`).join("") || `<div class="meta">未配置任务</div>`;
  return `<div class="card">
    <div class="top">
      <span class="dot ${g.health}" title="${g.health}"></span>
      <span class="name">${esc(g.name)}</span>
      <span class="badge adapter">${esc(g.adapter)}</span>
      ${g.enabled?"":'<span class="disabled-tag">已禁用</span>'}
    </div>
    <div class="body">
      <div class="row"><span class="k">最近</span><span class="val">${last}</span></div>
      ${lastErr}
      <div class="row"><span class="k">下次计划</span><span class="val">${g.next_run?fmtTime(g.next_run)+' ('+rel(g.next_run)+')':'—'}</span></div>
      <div class="row"><span class="k">任务 / 计划</span><span class="val">${g.tasks} / ${g.plans}</span></div>
      ${counts}
      <div class="tasks">${tasks}</div>
    </div>
  </div>`;
}

async function load(){
  try{
    const r=await fetch("/api/dashboard"); if(!r.ok) throw new Error("HTTP "+r.status);
    const d=await r.json(); $("#err").textContent="";
    $("#updated").textContent="更新于 "+new Date(d.generated_at).toLocaleTimeString();
    $("#stats").innerHTML =
      statCard(d.totals.games,"游戏")+statCard(d.totals.tasks,"任务")+statCard(d.totals.plans,"计划")+
      statCard(d.totals.running,"运行中")+statCard(d.totals.failed_24h,"24h 失败",d.totals.failed_24h>0);
    $("#games").innerHTML = (d.games||[]).map(gameCard).join("") || '<div class="empty">还没有配置游戏。用 ctl 或 REST API 添加。</div>';
    const rows=(d.recent||[]).map(e=>`<tr>
        <td>${e.id}</td><td>${esc(e.game_id)}</td><td>${esc(e.task_name)}</td>
        <td><span class="st ${e.status}">${e.status}</span></td>
        <td>${esc(e.trigger)}</td><td>${fmtTime(e.start_time)}</td>
        <td>${dur(e.duration_sec)}</td><td>${e.exit_code==null?'—':e.exit_code}</td></tr>`).join("");
    $("#recent").innerHTML = rows || '<tr><td colspan="8" class="empty">暂无执行记录</td></tr>';
  }catch(e){ $("#err").textContent="加载失败: "+e; }
}

let timer=null;
function setAuto(on){ if(timer){clearInterval(timer);timer=null;} if(on) timer=setInterval(load,5000); }
$("#auto").addEventListener("change",e=>setAuto(e.target.checked));
$("#refresh").addEventListener("click",load);
load(); setAuto(true);
</script>
</body>
</html>
