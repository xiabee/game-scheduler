name: Security

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Weekly, Monday 06:00 UTC — catches newly-disclosed vulnerabilities in code
    # that hasn't changed, so fixes are surfaced even without a commit.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
