version: 2
updates:
  # Go module dependencies — opens PRs for outdated/vulnerable deps weekly.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      go-deps:
        patterns: ["*"]

  # Keep the GitHub Actions themselves current (and on supported Node runtimes).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
